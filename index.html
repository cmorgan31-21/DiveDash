<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SoCal Shore Diving · Conditions Board</title>
<style>
:root{
  --mono: ui-monospace,"SFMono-Regular",Menlo,"Roboto Mono",monospace;
  --sans:"Helvetica Neue",Arial,system-ui,sans-serif;
  --panel:#0b2731; --panel2:#0f3543; --line:rgba(120,190,195,.13);
  --text:#e9f6f4; --muted:#8fb0b6; --foam:#57e0cf;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{min-height:100vh;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;
  background:radial-gradient(1200px 500px at 15% -10%,#0d3441 0%,transparent 60%),linear-gradient(180deg,#07191f,#051319 55%,#040f14)}
.muted{color:var(--muted)}

.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
.contours{position:absolute;inset:0;width:100%;height:100%}
.hero-inner{position:relative;max-width:1180px;margin:0 auto;padding:34px 22px 26px}
.hero-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--foam);opacity:.85}
.hero h1{margin:.25em 0 0;font-size:clamp(26px,4.4vw,42px);font-weight:800;letter-spacing:-.02em;line-height:1.02}
.hero h1 .thin{font-weight:300;color:var(--muted);letter-spacing:0}
.subtitle{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:.02em}
.hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.stamp{font-family:var(--mono);font-size:12px;color:var(--muted)}
.refresh{font-family:var(--mono);font-size:13px;color:#06222a;background:var(--foam);border:0;padding:9px 15px;border-radius:8px;cursor:pointer;font-weight:600}
.refresh:disabled{opacity:.55;cursor:wait}.refresh:hover:not(:disabled){filter:brightness(1.08)}

.featured{margin-top:26px;background:linear-gradient(180deg,rgba(15,53,67,.85),rgba(9,33,42,.8));border:1px solid var(--line);border-radius:16px;padding:18px 20px;backdrop-filter:blur(3px)}
.featured-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.featured-row{display:flex;align-items:center;gap:20px;margin-top:8px;flex-wrap:wrap}
.featured-body{min-width:180px;flex:1}
.featured-name{font-size:clamp(22px,3.2vw,30px);font-weight:800}
.featured-area{color:var(--muted);font-size:13px;margin-top:2px}
.featured-reason{font-family:var(--mono);font-size:13.5px;margin-top:6px;font-weight:600}
.featured-stats{display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:13px;color:#cfe9e6}
.featured-stats span{white-space:nowrap}

.controls{max-width:1180px;margin:0 auto;padding:20px 22px 4px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.seg{display:inline-flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg-btn{font-family:var(--mono);font-size:12.5px;color:var(--muted);background:transparent;border:0;padding:8px 14px;border-radius:7px;cursor:pointer}
.seg-btn.on{background:var(--foam);color:#06222a;font-weight:700}
.legend{display:flex;gap:14px;flex-wrap:wrap}
.leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.leg i{width:9px;height:9px;border-radius:50%;display:inline-block}

.ocean-wrap{max-width:1180px;margin:0 auto;padding:14px 22px 0;display:flex;flex-direction:column;gap:14px}
.ocean{background:linear-gradient(180deg,rgba(13,46,58,.7),rgba(8,28,36,.6));border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.ocean-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.ocean-head h2{margin:0;font-size:15px;font-weight:700;letter-spacing:.01em}
.ocean-sun{font-family:var(--mono);font-size:12px;color:var(--muted)}
.ocean-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:10px 0}
.ocean-card{background:rgba(6,22,28,.55);padding:10px 12px}
.ocean-card.chl{background:rgba(10,30,30,.66)}
.oc-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.oc-kind{opacity:.7}
.oc-big{font-family:var(--mono);font-size:19px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.oc-unit{font-size:12px;color:var(--muted);font-weight:400}
.oc-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}

.grid{max-width:1180px;margin:0 auto;padding:18px 22px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px 16px 12px;animation:rise .5s both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.eyebrow{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--muted)}
.eyebrow .dot{opacity:.5}
.diff{text-transform:uppercase;letter-spacing:.08em;font-size:9.5px}
.diff-easy{color:#67c98f}.diff-moderate{color:#f3d24b}.diff-advanced{color:#ef8a6a}
.card-name{margin:4px 0 3px;font-size:19px;font-weight:700;letter-spacing:-.01em}
.verdict{font-family:var(--mono);font-size:13px;font-weight:600}
.verdict .reason{color:var(--muted);font-weight:400}

.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin:14px 0 0;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.metrics.m8{grid-template-columns:repeat(4,1fr)}
.metric{background:rgba(6,22,28,.55);padding:9px 10px}
.metric-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.metric-val{font-family:var(--mono);font-size:18px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.metric-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:1px}

.buoyline{font-family:var(--mono);font-size:11.5px;color:#bfe0db;margin-top:10px;padding:7px 9px;background:rgba(87,224,207,.07);border:1px solid rgba(87,224,207,.15);border-radius:8px}
.buoyline .muted{color:var(--muted)}

.expand{width:100%;background:transparent;border:0;border-top:1px solid var(--line);margin-top:10px;padding:9px 0 5px;color:var(--foam);font-family:var(--mono);font-size:12px;cursor:pointer}
.expand:hover{color:#8df0e3}
.detail{padding-top:8px}
.factors{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.fbar{display:grid;grid-template-columns:84px 1fr 34px;align-items:center;gap:9px}
.fbar-label{font-family:var(--mono);font-size:11px;color:var(--muted)}
.fbar-track{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.fbar-fill{height:100%;background:linear-gradient(90deg,#57e0cf,#ef6a63);border-radius:4px}
.fbar-num{font-family:var(--mono);font-size:11px;text-align:right;color:var(--muted)}
.best{font-size:13px;line-height:1.5;color:#cfe4e2;margin:4px 0 10px}

.tide{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;color:#cfe4e2;border-top:1px solid var(--line);padding-top:9px;margin-top:2px}
.tide.muted{color:var(--muted)}
.tide-station{color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-size:9.5px}
.tide-pt b{margin-right:3px}.tide-pt .hi{color:var(--foam)}.tide-pt .lo{color:#7fa6ad}
.tide-range{margin-left:auto;font-size:11px}

.state{grid-column:1/-1;text-align:center;padding:50px 20px}
.state .refresh{margin-top:14px}

.foot{border-top:1px solid var(--line);background:rgba(4,13,17,.6)}
.foot-grid{max-width:1180px;margin:0 auto;padding:24px 22px 8px;display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap}
.foot h4{margin:0 0 6px;font-size:14px}
.foot p{font-size:13px;line-height:1.55;max-width:460px;margin:0}
.links{display:flex;flex-direction:column;gap:6px}
.links a{font-family:var(--mono);font-size:12.5px;color:var(--foam);text-decoration:none}
.links a:hover{text-decoration:underline}
.src{max-width:1180px;margin:14px auto 0;padding:10px 22px 26px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line)}

@media (max-width:560px){.metrics{grid-template-columns:repeat(2,1fr)}.metrics.m8{grid-template-columns:repeat(2,1fr)}.featured-stats{gap:12px}}
@media (prefers-reduced-motion:reduce){.card{animation:none}}

.diag{display:flex;flex-wrap:wrap;align-items:center;gap:12px;font-family:var(--mono);font-size:11px;color:var(--muted);
  background:rgba(6,22,28,.5);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:2px}
.dchip{display:inline-flex;align-items:center;gap:6px}
.dchip i{width:8px;height:8px;border-radius:50%;display:inline-block}
.dvia{color:#f3a64b}

.outlook{margin-top:11px}
.outlook-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.opills{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.opill{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(6,22,28,.5);border:1px solid var(--line);border-radius:8px;padding:6px 2px}
.opill-day{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
.opill-dot{width:9px;height:9px;border-radius:50%}
.opill-val{font-family:var(--mono);font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}

.trend-wrap{margin-top:13px;background:rgba(6,22,28,.4);border:1px solid var(--line);border-radius:10px;padding:9px 10px 4px}
.trend-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;margin-bottom:2px}
.trend{width:100%;height:auto;display:block}

.gb{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.gb-h{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.gb-h-ok{color:#67c98f}.gb-h-no{color:#ef8a6a}
.gb ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px}
.gb li{font-size:12px;line-height:1.35;color:#cfe4e2;display:flex;gap:6px;align-items:flex-start}
.gb-i{flex:none;font-family:var(--mono);font-weight:700;font-size:11px;line-height:1.4}
.gb-ok{color:#67c98f}.gb-no{color:#ef6a63}
.bars{margin-bottom:10px}
.bars summary{font-family:var(--mono);font-size:11px;color:var(--foam);cursor:pointer;margin-bottom:8px}
.bars summary:hover{color:#8df0e3}
@media (max-width:560px){.gb{grid-template-columns:1fr;gap:10px}}

.scrub{max-width:1180px;margin:6px auto 0;padding:12px 22px 4px}
.scrub-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.scrub-cap{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.scrub-time{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text)}
.scrub-time.on{color:var(--foam)}
.scrub-now{font-family:var(--mono);font-size:11px;color:#06222a;background:var(--foam);border:0;padding:4px 9px;border-radius:6px;cursor:pointer;font-weight:700}
.scrub-range{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:5px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,#57e0cf,#2f7d86);margin:2px 0}
.scrub-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
  background:#eafaf8;border:3px solid #57e0cf;cursor:grab;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.scrub-range::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#eafaf8;border:3px solid #57e0cf;cursor:grab}
.scrub-range:active::-webkit-slider-thumb{cursor:grabbing}
.scrub-ticks{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:3px}
.card.scrubbed{outline:1px solid rgba(87,224,207,.25)}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* =============================================================================
   SOCAL SHORE DIVING — CONDITIONS BOARD  (standalone, no dependencies)
   Orange County + San Diego County. Open this file in any normal browser
   (or host it) and the live feeds will load — there's no sandbox here.

   DATA: Open-Meteo (swell/wind) · NOAA CO-OPS (tides) ·
         NOAA NDBC via CoastWatch ERDDAP (buoys) ·
         NASA MODIS-Aqua via ERDDAP (chlorophyll / plankton = viz proxy)
   ============================================================================= */

var SITES = [
  // ---- ORANGE COUNTY ----
  { id:"shaws", name:"Shaw's Cove", region:"OC", area:"Laguna Beach",
    lat:33.5446, lon:-117.7957, faces:235, arc:[200,260], shelter:0.55,
    ideal:2.5, max:4, vizBase:18, diff:"Moderate", current:false,
    best:"Protected pocket reef. Best on small SW swell under ~2.5 ft, long period, light/offshore wind, mid-to-high tide for the rocky entry." },
  { id:"divers", name:"Diver's Cove", region:"OC", area:"Laguna Beach",
    lat:33.5432, lon:-117.7944, faces:235, arc:[205,260], shelter:0.55,
    ideal:2.5, max:4, vizBase:18, diff:"Easy", current:false,
    best:"Classic beginner cove next to Heisler Park. Sandy lanes between reef. Wants flat SW swell and calm morning wind." },
  { id:"fishermans", name:"Fisherman's Cove", region:"OC", area:"Laguna Beach",
    lat:33.5455, lon:-117.7972, faces:240, arc:[210,265], shelter:0.55,
    ideal:2.5, max:4, vizBase:17, diff:"Moderate", current:false,
    best:"Reef and small wall. Sheltered from NW; surge builds fast once surf tops ~3 ft. Higher tide eases the entry." },
  { id:"crescent", name:"Crescent Bay", region:"OC", area:"Laguna Beach",
    lat:33.5476, lon:-117.8005, faces:250, arc:[210,285], shelter:0.70,
    ideal:2.5, max:4, vizBase:18, diff:"Moderate", current:false,
    best:"More open than the coves — Seal Rock is the prize but it's exposed. Needs genuinely small, clean surf and light wind." },
  { id:"heisler", name:"Heisler Park / Picnic Beach", region:"OC", area:"Laguna Beach",
    lat:33.5418, lon:-117.7930, faces:235, arc:[205,260], shelter:0.60,
    ideal:2.5, max:4, vizBase:17, diff:"Moderate", current:false,
    best:"Marine reserve reef with good life. Best on a small SW window, long period, light wind, mid tide." },
  { id:"woods", name:"Wood's Cove", region:"OC", area:"Laguna Beach",
    lat:33.5338, lon:-117.7858, faces:225, arc:[195,255], shelter:0.60,
    ideal:2.5, max:4, vizBase:17, diff:"Moderate", current:false,
    best:"Big granite boulders and a kelp patch. Stair entry is dicey in surf — wants under ~2.5 ft and a higher tide." },
  { id:"crystal", name:"Crystal Cove (Reef Point)", region:"OC", area:"Newport Coast",
    lat:33.5710, lon:-117.8380, faces:235, arc:[200,265], shelter:0.72,
    ideal:2.5, max:4.5, vizBase:16, diff:"Moderate", current:false,
    best:"Long surface swim to scattered reef over sand. Fairly open beach — pick a small-swell, light-wind morning." },
  { id:"lilcorona", name:"Little Corona (Corona del Mar)", region:"OC", area:"Newport Beach",
    lat:33.5905, lon:-117.8693, faces:210, arc:[185,240], shelter:0.50,
    ideal:2.5, max:4, vizBase:16, diff:"Easy", current:false,
    best:"Jetty to the north blocks NW swell, so it stays diveable when Laguna is bumpy. Tidepools and reef; easy entry." },
  { id:"treasure", name:"Treasure Island", region:"OC", area:"Laguna Beach",
    lat:33.5292, lon:-117.7820, faces:235, arc:[205,260], shelter:0.60,
    ideal:2.5, max:4, vizBase:17, diff:"Easy", current:false,
    best:"Sandy entry with reef on the points (Goff Island). Forgiving for a small-swell, calm-wind day." },

  // ---- SAN DIEGO COUNTY ----
  { id:"ljcove", name:"La Jolla Cove", region:"SD", area:"La Jolla",
    lat:32.8508, lon:-117.2713, faces:320, arc:[300,340], shelter:0.42,
    ideal:2.5, max:4, vizBase:24, diff:"Moderate", current:false,
    best:"The most protected, clearest spot in SD — tucked behind the point, sheltered from S/SW. Stair entry wants a higher tide; usually the best-viz call." },
  { id:"ljshores", name:"La Jolla Shores", region:"SD", area:"La Jolla",
    lat:32.8569, lon:-117.2565, faces:250, arc:[215,290], shelter:0.72,
    ideal:2.0, max:3.5, vizBase:16, diff:"Easy", current:true,
    best:"Easy sand entry over the canyon head. Open to W/SW surf — best under ~2 ft with calm wind. Viz swings with swell and runoff." },
  { id:"marineroom", name:"Marine Room", region:"SD", area:"La Jolla",
    lat:32.8340, lon:-117.2545, faces:250, arc:[220,285], shelter:0.72,
    ideal:1.5, max:3.0, vizBase:14, diff:"Advanced", current:true,
    best:"Shallow and surgey — penalised hard by any swell. Reserve it for the flattest, longest-period days at higher tide." },
  { id:"childrens", name:"Children's Pool / Casa Cove", region:"SD", area:"La Jolla",
    lat:32.8489, lon:-117.2782, faces:235, arc:[205,260], shelter:0.50,
    ideal:2.0, max:3.5, vizBase:16, diff:"Moderate", current:false,
    best:"Seawall gives partial shelter. Watch seal closures. Wants small SW swell and light wind; entry off to the side." },
  { id:"birdrock", name:"Bird Rock", region:"SD", area:"La Jolla",
    lat:32.8147, lon:-117.2715, faces:255, arc:[225,290], shelter:0.65,
    ideal:2.0, max:3.5, vizBase:18, diff:"Advanced", current:false,
    best:"Rocky reef with good structure and viz when it cooperates. Tricky rock entry — small, clean, light-wind days only." },
  { id:"sunsetcliffs", name:"Sunset Cliffs", region:"SD", area:"Point Loma",
    lat:32.7160, lon:-117.2560, faces:250, arc:[225,290], shelter:0.80,
    ideal:1.5, max:2.5, vizBase:16, diff:"Advanced", current:true,
    best:"Exposed cliff entries — only on the calmest days at the right tide. High surf turns this dangerous quickly." },
  { id:"swamis", name:"Swami's (Encinitas)", region:"SD", area:"North County",
    lat:33.0345, lon:-117.2925, faces:250, arc:[210,290], shelter:0.80,
    ideal:2.0, max:3.5, vizBase:16, diff:"Advanced", current:true,
    best:"Reef and cobble in a marine reserve. Open North County beach — needs a small, long-period swell and a tide that covers the cobble." },
];

/* Ideal tide window per site (feet, MLLW) + how much it matters (0–1).
   Rocky/stair entries want more water; sand entries barely care. Sunset Cliffs
   has an upper bound too — too high floods the cliff entry, too low exposes rock. */
var TIDE_PREF = {
  shaws:{ideal:[2,7],sens:.5}, divers:{ideal:[1,7],sens:.3}, fishermans:{ideal:[2,7],sens:.5},
  crescent:{ideal:[1.5,7],sens:.4}, heisler:{ideal:[1.5,7],sens:.4}, woods:{ideal:[2.5,7],sens:.6},
  crystal:{ideal:[0,7],sens:.2}, lilcorona:{ideal:[1,7],sens:.3}, treasure:{ideal:[1,7],sens:.3},
  ljcove:{ideal:[2.5,7],sens:.6}, ljshores:{ideal:[-2,7],sens:.1}, marineroom:{ideal:[3,7],sens:.75},
  childrens:{ideal:[1.5,7],sens:.4}, birdrock:{ideal:[2,7],sens:.6}, sunsetcliffs:{ideal:[2,5],sens:.7},
  swamis:{ideal:[1.5,7],sens:.5}
};

var BUOYS = [
  { id:"46254", name:"Scripps Nearshore", region:"SD", kind:"nearshore", lat:32.868, lon:-117.267 },
  { id:"46232", name:"Point Loma South", region:"SD", kind:"offshore", lat:32.517, lon:-117.425 },
  { id:"46222", name:"San Pedro", region:"OC", kind:"nearest", lat:33.614, lon:-118.314 },
];

var TIDE_STATIONS = {
  SD:{ id:"9410230", label:"La Jolla" },
  OC:{ id:"9410580", label:"Newport Bay Entrance" },
};
var CHL_BOX = {
  SD:{ n:32.95, s:32.60, w:-117.42, e:-117.20 },
  OC:{ n:33.66, s:33.45, w:-118.10, e:-117.78 },
};
var REGION_LABEL = { OC:"Orange County", SD:"San Diego County" };

/* ---------- math + format ---------- */
var M_TO_FT = 3.28084, MS_TO_KN = 1.94384;
function c2f(c){ return (c==null||isNaN(c))?null:c*9/5+32; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function round1(v){ return Math.round(v*10)/10; }
function compass(d){
  if(d==null||isNaN(d)) return "—";
  return ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"][Math.round(d/22.5)%16];
}
function angDiff(a,b){ var d=Math.abs(a-b)%360; return d>180?360-d:d; }
function inArc(deg,a,b){ return a<=b ? (deg>=a&&deg<=b) : (deg>=a||deg<=b); }
function exposureMult(site,sd){
  if(sd==null||isNaN(sd)) return (1+site.shelter)/2;
  if(inArc(sd,site.arc[0],site.arc[1])) return 1.0;
  var e=Math.min(angDiff(sd,site.arc[0]),angDiff(sd,site.arc[1]));
  return e<=25 ? site.shelter+(1-site.shelter)*(1-e/25) : site.shelter;
}
function isOnshore(faces,w){ return (w==null||isNaN(w))?false:angDiff(faces,w)<70; }
function geoDist(a,b){ var dx=(a.lon-b.lon)*Math.cos((a.lat+b.lat)/2*Math.PI/180); return Math.hypot(dx,a.lat-b.lat); }

var SITE_BUOY = {};
SITES.forEach(function(s){
  var cands=BUOYS.filter(function(b){return b.region===s.region;});
  var best=null,bd=Infinity;
  cands.forEach(function(b){var d=geoDist(s,b); if(d<bd){bd=d;best=b;}});
  SITE_BUOY[s.id]=best?best.id:null;
});

/* ---------- scoring ---------- */
function scoreSite(site,L,ctx){
  ctx=ctx||{};
  var dirMult=exposureMult(site,L.swellDir);
  var effSurf=(L.waveFt==null?0:L.waveFt)*dirMult;        // true wave height reaching the spot
  // Wave energy ∝ H²·T. A long-period groundswell drives far more surge into an
  // entry than the same height of short windchop, so scale the *effective* surf
  // by an energy factor (period 10s = neutral). This is what the surf/entry
  // penalty is judged against — not raw height.
  var period=L.swellPeriod||10;
  var energyFactor=clamp(Math.sqrt(period/10),0.8,1.55);
  var energySurf=effSurf*energyFactor;
  var score=100, f={};

  var surfPen;
  if(energySurf<=site.ideal) surfPen=(energySurf/site.ideal)*8;
  else if(energySurf<=site.max) surfPen=8+((energySurf-site.ideal)/(site.max-site.ideal))*37;
  else surfPen=45+clamp((energySurf-site.max)/site.max,0,1)*40;
  f.surf=surfPen; score-=surfPen;

  var onshore=isOnshore(site.faces,L.windDir), windPen=0;
  if(L.windKn!=null&&L.windKn>4) windPen+=Math.min(22,(L.windKn-4)*2.0);
  if(onshore&&L.windKn>7) windPen+=6;
  if(!onshore&&L.windKn!=null&&L.windKn<=12) windPen=Math.max(0,windPen-4);
  f.wind=windPen; score-=windPen;

  // short period still dings viz/surface texture (separate axis from entry energy)
  var periodPen=0;
  if(L.swellPeriod&&L.swellPeriod<8) periodPen=Math.min(14,(8-L.swellPeriod)*3);
  f.period=periodPen; score-=periodPen;

  var rainPen=0;
  if(L.rain72>=25) rainPen=22; else if(L.rain72>=10) rainPen=14; else if(L.rain72>=3) rainPen=7;
  if(L.precipNow>0.1) rainPen+=4;
  f.rain=rainPen; score-=rainPen;

  var bloomPen=0, chl=ctx.chl;
  if(chl!=null){ if(chl>5) bloomPen=18; else if(chl>2) bloomPen=11; else if(chl>0.8) bloomPen=5; }
  f.bloom=bloomPen; score-=bloomPen;

  var curPen=0;
  if(site.current&&ctx.tidalRange!=null&&ctx.tidalRange>5) curPen=Math.min(6,(ctx.tidalRange-5)*2);
  f.current=curPen; score-=curPen;

  // tide-height fit: score the *current* tide against this site's entry window
  var tidePen=0, pref=TIDE_PREF[site.id];
  if(pref && ctx.tideNow!=null){
    if(ctx.tideNow<pref.ideal[0]) tidePen=Math.min(10,(pref.ideal[0]-ctx.tideNow)*3*pref.sens);
    else if(ctx.tideNow>pref.ideal[1]) tidePen=Math.min(10,(ctx.tideNow-pref.ideal[1])*3*pref.sens);
  }
  f.tide=tidePen; score-=tidePen;

  score=clamp(Math.round(score),0,100);

  var top=Object.keys(f).map(function(k){return [k,f[k]];}).sort(function(a,b){return b[1]-a[1];})[0];
  var reason;
  if(score>=80) reason=(onshore&&L.windKn<=4)?"Small surf, glassy":"Small surf, light wind";
  else if(top[1]<6) reason="Clean and mellow";
  else if(top[0]==="surf") reason=energySurf>site.max?(period>=13?"Heavy long-period energy":"Too much surf for the entry"):"Workable but surfy";
  else if(top[0]==="wind") reason=onshore?"Onshore wind chopping it up":"Windy surface";
  else if(top[0]==="period") reason="Short-period wind swell — hazy";
  else if(top[0]==="bloom") reason="Plankton bloom — green water";
  else if(top[0]==="current") reason="Big tidal swing — currents";
  else if(top[0]==="tide") reason=(pref&&ctx.tideNow<pref.ideal[0])?"Tide too low for the entry":"Tide's off for the entry";
  else reason="Recent runoff — expect murk";

  return { score:score, effSurf:effSurf, energySurf:energySurf, energyFactor:energyFactor, dirMult:dirMult, onshore:onshore, f:f, reason:reason };
}

function vizEstimate(site,L,effSurf,ctx){
  ctx=ctx||{};
  var v=site.vizBase;
  v-=Math.max(0,effSurf-2)*2.5;
  if(L.swellPeriod&&L.swellPeriod<8) v-=(8-L.swellPeriod)*1.2;
  if(L.rain72>=25) v-=12; else if(L.rain72>=10) v-=7; else if(L.rain72>=3) v-=3;
  var chl=ctx.chl;
  if(chl!=null){ if(chl>5) v-=12; else if(chl>2) v-=7; else if(chl>0.8) v-=3; }
  v=clamp(v,2,40);
  return [Math.max(2,Math.round(v-3)),Math.round(v+4)];
}

function VERDICT(s){
  return s>=80?{label:"Excellent",key:"excellent"}:
         s>=65?{label:"Good",key:"good"}:
         s>=50?{label:"Fair",key:"fair"}:
         s>=35?{label:"Marginal",key:"marginal"}:
                {label:"Blown out",key:"blown"};
}
var COLORS = { excellent:"#57e0cf", good:"#67c98f", fair:"#f3d24b", marginal:"#f3a64b", blown:"#ef6a63" };

function chlLabel(c){
  if(c==null) return ["No recent pass","satellite clouded / gap","#8fb0b6"];
  if(c<0.5) return ["Clear","low plankton",COLORS.excellent];
  if(c<1) return ["Mostly clear","slight color",COLORS.good];
  if(c<2) return ["Some color","moderate plankton",COLORS.fair];
  if(c<5) return ["Greenish","bloom likely",COLORS.marginal];
  return ["Green water","heavy bloom / red tide",COLORS.blown];
}
function currentRating(r){
  if(r==null) return ["—","#8fb0b6"];
  if(r<3.5) return ["mild currents",COLORS.good];
  if(r<5.5) return ["moderate currents",COLORS.fair];
  return ["strong currents",COLORS.marginal];
}
// interpolate tide height (ft) at a moment between hi/lo points (cosine curve)
function interpTide(points, atMs){
  if(!points||points.length<2) return null;
  var s=points.slice().sort(function(a,b){return a.epoch-b.epoch;});
  var prev=null,next=null;
  for(var i=0;i<s.length;i++){
    if(s[i].epoch<=atMs) prev=s[i];
    if(s[i].epoch>=atMs && next===null) next=s[i];
  }
  if(!prev&&!next) return null;
  if(!prev) return { ft:s[0].ft, trend:s[0].type==="H"?"rising":"falling" };
  if(!next) return { ft:prev.ft, trend:prev.type==="H"?"falling":"rising" };
  if(prev.epoch===next.epoch) return { ft:prev.ft, trend:"slack" };
  var fr=(atMs-prev.epoch)/(next.epoch-prev.epoch);
  var h=prev.ft+(next.ft-prev.ft)*(1-Math.cos(Math.PI*fr))/2;
  return { ft:round1(h), trend: next.ft>prev.ft?"rising":"falling" };
}
function tideFit(siteId, tideNow){
  var pref=TIDE_PREF[siteId];
  if(!pref||tideNow==null) return ["—","#8fb0b6"];
  if(tideNow<pref.ideal[0]) return ["low for entry",COLORS.marginal];
  if(tideNow>pref.ideal[1]) return ["high",COLORS.fair];
  return ["good",COLORS.good];
}
// deep-water wave power index (kW per metre of crest): P ≈ 0.49·Hs²·Te
function wavePowerKW(heightFt, periodS){
  if(heightFt==null||!periodS) return null;
  var Hm=heightFt/M_TO_FT, Te=0.9*periodS;
  return 0.49*Hm*Hm*Te;
}
function ago(iso){
  if(!iso) return "";
  var mins=Math.round((Date.now()-new Date(iso).getTime())/60000);
  if(mins<0) return "now";
  if(mins<60) return mins+"m ago";
  var h=Math.floor(mins/60); return h<24 ? h+"h ago" : Math.floor(h/24)+"d ago";
}

/* ---------- time helpers ---------- */
function laParts(d){
  d=d||new Date();
  return new Intl.DateTimeFormat("en-CA",{timeZone:"America/Los_Angeles",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",hourCycle:"h23"})
    .formatToParts(d).reduce(function(o,x){o[x.type]=x.value;return o;},{});
}
function laHourISO(d){ var p=laParts(d); return p.year+"-"+p.month+"-"+p.day+"T"+p.hour+":00"; }
function laDate(d){ var p=laParts(d); return p.year+"-"+p.month+"-"+p.day; }
function fmtClock(iso){
  if(!iso) return "—";
  var hh=parseInt(iso.slice(11,13),10), mm=iso.slice(14,16);
  return (((hh+11)%12)+1)+":"+mm+(hh>=12?"p":"a");
}
function asArray(j){ return Array.isArray(j)?j:[j]; }
function idxByTime(hourly,iso){ if(!hourly||!hourly.time) return 0; var i=hourly.time.indexOf(iso); return i>=0?i:0; }

/* ---------- network layer ----------
   Try the API directly first. If the browser blocks it (CORS, a privacy
   extension, or the file being opened locally), retry through a public CORS
   proxy. Direct is always preferred; proxies are a fallback only. */
var DIAG = { marine:"…", forecast:"…", tides:"…", buoys:"…", chl:"…", via:"direct" };
var PROXIES = [
  function(u){ return "https://corsproxy.io/?url=" + encodeURIComponent(u); },
  function(u){ return "https://api.allorigins.win/raw?url=" + encodeURIComponent(u); }
];
function fetchText(url){
  return fetch(url, { mode:"cors" }).then(function(r){
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r.text();
  }).catch(function(directErr){
    // walk the proxy list; first success wins
    return PROXIES.reduce(function(chain, mk){
      return chain.catch(function(){
        return fetch(mk(url)).then(function(r){
          if(!r.ok) throw new Error("proxy HTTP " + r.status);
          DIAG.via = "proxy";
          return r.text();
        });
      });
    }, Promise.reject(directErr));
  });
}
function fetchJSON(url){ return fetchText(url).then(function(t){ return JSON.parse(t); }); }

/* ---------- fetchers ---------- */
function fetchTidesWeek(stationId){
  var beginD=laDate(), end=new Date(); end.setDate(end.getDate()+7);
  var endD=laDate(end);
  var b=beginD.replace(/-/g,""), e=endD.replace(/-/g,"");
  var url="https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date="+b+"&end_date="+e+"&station="+stationId+
    "&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&format=json";
  return fetchJSON(url).then(function(j){
    return (j.predictions||[]).map(function(p){
      var datePart=p.t.slice(0,10);
      var t=new Date(p.t.replace(" ","T")), hh=t.getHours(), mm=String(t.getMinutes()).padStart(2,"0");
      return { type:p.type, ft:round1(parseFloat(p.v)), time:(((hh+11)%12)+1)+":"+mm+(hh>=12?"p":"a"), date:datePart, epoch:t.getTime() };
    });
  });
}
function fetchBuoys(){
  var ids=BUOYS.map(function(b){return b.id;}).join("|");
  var q='station,time,wvht,dpd,apd,mwd,wtmp,wspd,wd&time>=now-5days&station=~"('+ids+')"&orderByMax("station,time")';
  var url="https://coastwatch.pfeg.noaa.gov/erddap/tabledap/cwwcNDBCMet.json?"+encodeURI(q);
  return fetchJSON(url).then(function(j){
    var t=j&&j.table; if(!t||!t.rows) return {};
    var ci={}; t.columnNames.forEach(function(n,i){ci[n]=i;});
    var out={};
    t.rows.forEach(function(row){
      out[row[ci.station]]={
        time:row[ci.time],
        wvhtFt:row[ci.wvht]!=null?row[ci.wvht]*M_TO_FT:null,
        dpd:row[ci.dpd], apd:row[ci.apd], mwd:row[ci.mwd],
        wtmpF:c2f(row[ci.wtmp]),
        windKn:row[ci.wspd]!=null?row[ci.wspd]*MS_TO_KN:null,
        wd:row[ci.wd]
      };
    });
    return out;
  });
}
function fetchChl(box){
  var q="chlorophyll[(last)][("+box.n+"):("+box.s+")][("+box.w+"):("+box.e+")]";
  var url="https://coastwatch.pfeg.noaa.gov/erddap/griddap/erdMH1chla8day.json?"+encodeURI(q);
  return fetchJSON(url).then(function(j){
    var t=j&&j.table; if(!t||!t.rows||!t.rows.length) return null;
    var ci=t.columnNames.indexOf("chlorophyll"), ti=t.columnNames.indexOf("time");
    var sum=0,n=0,when=null;
    t.rows.forEach(function(row){ var v=row[ci]; if(v!=null&&!isNaN(v)){sum+=v;n++;} if(!when) when=row[ti]; });
    return n ? { chl:sum/n, n:n, when:when } : { chl:null, n:0, when:when };
  });
}
function settle(p){ return p.then(function(v){return v;}).catch(function(){return null;}); }

function fetchAll(){
  var lats=SITES.map(function(s){return s.lat;}).join(",");
  var lons=SITES.map(function(s){return s.lon;}).join(",");

  var marineURL="https://marine-api.open-meteo.com/v1/marine?latitude="+lats+"&longitude="+lons+
    "&current=wave_height,swell_wave_height,swell_wave_direction,swell_wave_period,wind_wave_height"+
    "&hourly=wave_height,sea_surface_temperature,swell_wave_height,swell_wave_direction,swell_wave_period"+
    "&daily=wave_height_max,swell_wave_height_max,swell_wave_period_max,swell_wave_direction_dominant"+
    "&timezone=America%2FLos_Angeles&forecast_days=7";
  var fcURL="https://api.open-meteo.com/v1/forecast?latitude="+lats+"&longitude="+lons+
    "&current=wind_speed_10m,wind_direction_10m,precipitation"+
    "&hourly=wind_speed_10m,wind_direction_10m,precipitation"+
    "&daily=precipitation_sum,sunrise,sunset,uv_index_max,wind_speed_10m_max,wind_direction_10m_dominant"+
    "&past_days=3&forecast_days=7"+
    "&wind_speed_unit=kn&timezone=America%2FLos_Angeles";

  return Promise.allSettled([fetchJSON(marineURL), fetchJSON(fcURL)]).then(function(core){
    var marineR=core[0], fcR=core[1];
    DIAG.marine   = marineR.status==="fulfilled" ? "ok" : "fail";
    DIAG.forecast = fcR.status==="fulfilled" ? "ok" : "fail";
    if(marineR.status!=="fulfilled"){
      var reason=(marineR.reason&&marineR.reason.message)||"request blocked";
      var err=new Error("Couldn't reach the swell data ("+reason+")");
      err.diag=DIAG; throw err;
    }
    var marine=asArray(marineR.value);
    // forecast (wind/rain/astro) is optional — degrade to blanks if it failed
    var fc = fcR.status==="fulfilled" ? asArray(fcR.value) : marine.map(function(){ return {}; });
    return Promise.all([
      settle(fetchTidesWeek(TIDE_STATIONS.SD.id)), settle(fetchTidesWeek(TIDE_STATIONS.OC.id)),
      settle(fetchBuoys()), settle(fetchChl(CHL_BOX.SD)), settle(fetchChl(CHL_BOX.OC))
    ]).then(function(ex){
      var tidesWeek={SD:ex[0],OC:ex[1]}, buoyData=ex[2]||{}, chl={SD:ex[3],OC:ex[4]};
      // today-only slice, kept in the original shape the tide strip expects
      var today0=laDate();
      var tides={
        SD: tidesWeek.SD ? tidesWeek.SD.filter(function(p){return p.date===today0;}).map(function(p){return {type:p.type,ft:p.ft,time:p.time};}) : null,
        OC: tidesWeek.OC ? tidesWeek.OC.filter(function(p){return p.date===today0;}).map(function(p){return {type:p.type,ft:p.ft,time:p.time};}) : null
      };
      // per-date tidal range, for the 7-day outlook scoring
      function rangeByDate(list){
        if(!list) return {};
        var byDate={};
        list.forEach(function(p){ (byDate[p.date]=byDate[p.date]||[]).push(p.ft); });
        var out={};
        Object.keys(byDate).forEach(function(d){ var vs=byDate[d]; out[d]=round1(Math.max.apply(null,vs)-Math.min.apply(null,vs)); });
        return out;
      }
      var rangeByDateMap={ SD:rangeByDate(tidesWeek.SD), OC:rangeByDate(tidesWeek.OC) };
      DIAG.tides = (ex[0]||ex[1]) ? "ok" : "fail";
      DIAG.buoys = (ex[2]&&Object.keys(ex[2]).length) ? "ok" : "fail";
      DIAG.chl   = (ex[3]||ex[4]) ? "ok" : "fail";
      var nowISO=laHourISO(), today=laDate();

      var live=SITES.map(function(s,i){
        var m=marine[i]||{}, w=fc[i]||{};
        var mi=idxByTime(m.hourly,(m.current&&m.current.time)||nowISO);
        var sstC=m.hourly&&m.hourly.sea_surface_temperature?m.hourly.sea_surface_temperature[mi]:null;

        var dTimes=(w.daily&&w.daily.time)||[];
        var dIdx=Math.max(0,dTimes.indexOf(today));
        var psum=(w.daily&&w.daily.precipitation_sum)||[];
        var rain72=psum.slice(Math.max(0,dIdx-2),dIdx+1).reduce(function(a,b){return a+(b||0);},0);
        var sunrise=w.daily&&w.daily.sunrise?w.daily.sunrise[dIdx]:null;
        var sunset=w.daily&&w.daily.sunset?w.daily.sunset[dIdx]:null;
        var srH=sunrise?parseInt(sunrise.slice(11,13),10):6;
        var ssH=sunset?parseInt(sunset.slice(11,13),10):19;

        var windowTxt=null;
        if(m.hourly&&m.hourly.wave_height&&m.hourly.time){
          var start=Math.max(0,m.hourly.time.indexOf((m.current&&m.current.time)||nowISO));
          var bestH=Infinity,bestT=null;
          for(var k=start;k<Math.min(start+14,m.hourly.time.length);k++){
            var hr=parseInt(m.hourly.time[k].slice(11,13),10);
            if(hr<srH||hr>ssH) continue;
            var wh=m.hourly.wave_height[k];
            if(wh!=null&&wh<bestH){bestH=wh;bestT=m.hourly.time[k];}
          }
          if(bestT){ var hr2=parseInt(bestT.slice(11,13),10); windowTxt=(((hr2+11)%12)+1)+(hr2>=12?"pm":"am"); }
        }

        var buoy=buoyData[SITE_BUOY[s.id]]||null;
        var cur=m.current||{};

        // ---- hourly divability series for the next ~72h ----
        var series=[], bestWindow=null;
        if(m.hourly&&m.hourly.time){
          var mt=m.hourly.time, mh=m.hourly, wh2=w.hourly||{}, wt=wh2.time||[];
          var wsMap={}, wdMap={}, pArr=[], acc=0, pIdx={};
          for(var j=0;j<wt.length;j++){
            wsMap[wt[j]]=wh2.wind_speed_10m?wh2.wind_speed_10m[j]:null;
            wdMap[wt[j]]=wh2.wind_direction_10m?wh2.wind_direction_10m[j]:null;
            acc+=(wh2.precipitation?(wh2.precipitation[j]||0):0); pArr[j]=acc; pIdx[wt[j]]=j;
          }
          function rain72ISO(tISO){ var idx=pIdx[tISO]; if(idx==null) return 0; var lo=idx-72>=0?pArr[idx-72]:0; return (pArr[idx]||0)-lo; }
          function pNow(tISO){ var idx=pIdx[tISO]; return idx==null?0:(wh2.precipitation?(wh2.precipitation[idx]||0):0); }
          var srMap={}, dT=(w.daily&&w.daily.time)||[];
          for(var d2=0;d2<dT.length;d2++){
            var sr2=w.daily.sunrise?w.daily.sunrise[d2]:null, ss2=w.daily.sunset?w.daily.sunset[d2]:null;
            srMap[dT[d2]]=[sr2?parseInt(sr2.slice(11,13),10):6, ss2?parseInt(ss2.slice(11,13),10):19];
          }
          var rbd=rangeByDateMap[s.region]||{};
          var s0=mt.indexOf(nowISO); if(s0<0) s0=0;
          var hchl=chl[s.region]?chl[s.region].chl:null;
          for(var k2=s0;k2<Math.min(s0+73,mt.length);k2++){
            var tISO=mt[k2], dd=tISO.slice(0,10), hh3=parseInt(tISO.slice(11,13),10);
            var hwave = mh.wave_height&&mh.wave_height[k2]!=null?mh.wave_height[k2]*M_TO_FT:null;
            var hswell = mh.swell_wave_height&&mh.swell_wave_height[k2]!=null?mh.swell_wave_height[k2]*M_TO_FT:null;
            var hper = mh.swell_wave_period?mh.swell_wave_period[k2]:null;
            var hsst = mh.sea_surface_temperature?mh.sea_surface_temperature[k2]:null;
            var hourL={
              waveFt: hwave,
              swellDir: mh.swell_wave_direction?mh.swell_wave_direction[k2]:null,
              swellPeriod: hper,
              windKn: wsMap[tISO], windDir: wdMap[tISO],
              precipNow: pNow(tISO), rain72: rain72ISO(tISO)
            };
            var tn2v=interpTide(tidesWeek[s.region], new Date(tISO).getTime());
            var hctx={ chl:hchl, tidalRange:rbd[dd]!=null?rbd[dd]:null, tideNow:tn2v?tn2v.ft:null };
            var hsc=scoreSite(s,hourL,hctx);
            var sb=srMap[dd]||[6,19], day=hh3>=sb[0]&&hh3<=sb[1];
            series.push({
              tISO:tISO, date:dd, hr:hh3, day:day,
              score:hsc.score, key:VERDICT(hsc.score).key, reason:hsc.reason,
              waveFt:hwave, swellFt:hswell, swellDir:hourL.swellDir, swellPeriod:hper,
              windKn:hourL.windKn, windDir:hourL.windDir, onshore:hsc.onshore,
              effSurf:hsc.effSurf, dirMult:hsc.dirMult,
              tideNow:tn2v?tn2v.ft:null, tideTrend:tn2v?tn2v.trend:null,
              sstF:c2f(hsst), viz:hwave!=null?vizEstimate(s,hourL,hsc.effSurf,hctx):null,
              energyKW:wavePowerKW(hswell!=null?hswell:hwave, hper)
            });
          }
          // best daylight window: peak hour, expanded while within 8 pts and same day
          var peakI=-1, peakV=-1;
          for(var p=0;p<series.length;p++){ if(series[p].day&&series[p].score>peakV){ peakV=series[p].score; peakI=p; } }
          if(peakI>=0){
            var a=peakI,b=peakI;
            while(a-1>=0&&series[a-1].day&&series[a-1].date===series[peakI].date&&series[a-1].score>=peakV-8) a--;
            while(b+1<series.length&&series[b+1].day&&series[b+1].date===series[peakI].date&&series[b+1].score>=peakV-8) b++;
            bestWindow={ peak:peakV, key:VERDICT(peakV).key, date:series[peakI].date, hrA:series[a].hr, hrB:series[b].hr };
          }
        }

        return {
          waveFt:cur.wave_height!=null?cur.wave_height*M_TO_FT:null,
          swellFt:cur.swell_wave_height!=null?cur.swell_wave_height*M_TO_FT:null,
          swellDir:cur.swell_wave_direction!=null?cur.swell_wave_direction:null,
          swellPeriod:cur.swell_wave_period!=null?cur.swell_wave_period:null,
          windWaveFt:cur.wind_wave_height!=null?cur.wind_wave_height*M_TO_FT:null,
          windKn:w.current&&w.current.wind_speed_10m!=null?w.current.wind_speed_10m:null,
          windDir:w.current&&w.current.wind_direction_10m!=null?w.current.wind_direction_10m:null,
          precipNow:w.current&&w.current.precipitation!=null?w.current.precipitation:0,
          rain72:rain72, sunrise:sunrise, sunset:sunset,
          sstF:c2f(sstC), buoy:buoy, buoyId:SITE_BUOY[s.id], window:windowTxt,
          series:series, bestWindow:bestWindow, chartInner:buildChartInner(series,bestWindow)
        };
      });

      function tidalRange(rgn){ var t=tides[rgn]; if(!t||!t.length) return null; var vs=t.map(function(x){return x.ft;}); return round1(Math.max.apply(null,vs)-Math.min.apply(null,vs)); }
      var nowMs=Date.now();
      var repIdx={SD:SITES.findIndex(function(s){return s.region==="SD";}),OC:SITES.findIndex(function(s){return s.region==="OC";})};
      var ctx={};
      ["SD","OC"].forEach(function(rgn){
        var L=live[repIdx[rgn]]||{};
        var fdaily=fc[repIdx[rgn]]&&fc[repIdx[rgn]].daily;
        var di=Math.max(0,((fdaily&&fdaily.time)||[]).indexOf(today));
        var tn=interpTide(tidesWeek[rgn], nowMs);
        ctx[rgn]={
          chl:chl[rgn]?chl[rgn].chl:null, chlWhen:chl[rgn]?chl[rgn].when:null,
          tidalRange:tidalRange(rgn), tideNow:tn?tn.ft:null, tideTrend:tn?tn.trend:null,
          sunrise:L.sunrise, sunset:L.sunset,
          uv:fdaily&&fdaily.uv_index_max?fdaily.uv_index_max[di]:null
        };
      });

      // ---- 7-day outlook: daily-aggregate score per site ----
      // Note: chlorophyll has no forward forecast (satellite is observational),
      // so every outlook day reuses today's regional reading, labeled as such in the UI.
      var WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      live.forEach(function(L,i){
        var s=SITES[i], m=marine[i]||{}, w=fc[i]||{};
        var mDaily=m.daily||{}, wDaily=w.daily||{};
        var days=(mDaily.time||wDaily.time||[]).slice(0,7);
        var rbd=rangeByDateMap[s.region]||{};
        L.outlook=days.map(function(dateStr,d){
          var dayL={
            waveFt: mDaily.wave_height_max&&mDaily.wave_height_max[d]!=null ? mDaily.wave_height_max[d]*M_TO_FT : null,
            swellDir: mDaily.swell_wave_direction_dominant?mDaily.swell_wave_direction_dominant[d]:null,
            swellPeriod: mDaily.swell_wave_period_max?mDaily.swell_wave_period_max[d]:null,
            windKn: wDaily.wind_speed_10m_max?wDaily.wind_speed_10m_max[d]:null,
            windDir: wDaily.wind_direction_10m_dominant?wDaily.wind_direction_10m_dominant[d]:null,
            precipNow:0,
            rain72: (wDaily.precipitation_sum||[]).slice(Math.max(0,d-2),d+1).reduce(function(a,b){return a+(b||0);},0)
          };
          var dayCtx={ chl: ctx[s.region].chl, tidalRange: rbd[dateStr]!=null?rbd[dateStr]:ctx[s.region].tidalRange };
          var sc = dayL.waveFt!=null ? scoreSite(s,dayL,dayCtx) : null;
          var dow=new Date(dateStr+"T12:00:00").getDay();
          return {
            date:dateStr, label: d===0?"Today":WD[dow],
            score: sc?sc.score:null, reason: sc?sc.reason:"No data",
            waveFt: dayL.waveFt, windKn: dayL.windKn
          };
        });
      });

      return { live:live, tides:tides, buoyData:buoyData, ctx:ctx, when:new Date(), diag:Object.assign({},DIAG) };
    });
  });
}

function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

function ring(score,color,size){

function hourLabel(hr){ return (((hr+11)%12)+1)+(hr>=12?"p":"a"); }
function hourLabelLong(hr){ return (((hr+11)%12)+1)+" "+(hr>=12?"PM":"AM"); }
function dayLabelRel(dateStr){
  var t0=laDate(), tn=new Date(); tn.setDate(tn.getDate()+1); var t1=laDate(tn);
  if(dateStr===t0) return "Today";
  if(dateStr===t1) return "Tom";
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(dateStr+"T12:00:00").getDay()];
}

// hourly divability line graph (≈72h). Static parts (bands/line/labels) are
// built once; the scrub cursor is drawn separately so dragging stays cheap.
var CHART_GEOM={ W:600, H:92, padL:4, padR:4, padT:6, padB:18 };
function chartX(i,N){ var g=CHART_GEOM; return g.padL+(i/(N-1))*(g.W-g.padL-g.padR); }
function chartY(v){ var g=CHART_GEOM; return g.padT+(1-v/100)*(g.H-g.padT-g.padB); }
function buildChartInner(series, bestWindow){
  if(!series||series.length<3) return null;
  var N=series.length, g=CHART_GEOM, plotH=g.H-g.padT-g.padB;
  var x=function(i){return chartX(i,N);}, y=chartY;
  var bands="", i=0;
  while(i<N){
    if(!series[i].day){ var j=i; while(j+1<N&&!series[j+1].day) j++;
      var x0=x(i-0.5<0?0:i-0.5), x1=x(j+0.5>N-1?N-1:j+0.5);
      bands+='<rect x="'+x0+'" y="'+g.padT+'" width="'+(x1-x0)+'" height="'+plotH+'" fill="rgba(3,12,16,.55)"></rect>'; i=j+1;
    } else i++;
  }
  var ticks="", labels="", seen={};
  for(var k=0;k<N;k++){ var dd=series[k].date; if(!seen[dd]){ seen[dd]=k; if(k>0) ticks+='<line x1="'+x(k)+'" y1="'+g.padT+'" x2="'+x(k)+'" y2="'+(g.padT+plotH)+'" stroke="rgba(120,190,195,.18)" stroke-width="1" vector-effect="non-scaling-stroke"></line>'; } }
  Object.keys(seen).forEach(function(dd){
    var idxs=series.map(function(p,ix){return p.date===dd?ix:-1;}).filter(function(v){return v>=0;});
    var mid=idxs[Math.floor(idxs.length/2)];
    labels+='<text x="'+x(mid)+'" y="'+(g.H-5)+'" text-anchor="middle" fill="#8fb0b6" font-size="11" font-family="var(--mono)">'+dayLabelRel(dd)+'</text>';
  });
  var grid='<line x1="'+g.padL+'" y1="'+y(80)+'" x2="'+(g.W-g.padR)+'" y2="'+y(80)+'" stroke="rgba(120,190,195,.10)" stroke-width="1" vector-effect="non-scaling-stroke"></line>'+
           '<line x1="'+g.padL+'" y1="'+y(50)+'" x2="'+(g.W-g.padR)+'" y2="'+y(50)+'" stroke="rgba(120,190,195,.08)" stroke-width="1" vector-effect="non-scaling-stroke"></line>';
  var d="", area="M"+x(0)+" "+y(0);
  for(var p2=0;p2<N;p2++){ d+=(p2?" L":"M")+x(p2)+" "+y(series[p2].score); area+=" L"+x(p2)+" "+y(series[p2].score); }
  area+=" L"+x(N-1)+" "+y(0)+" Z";
  var peak="";
  if(bestWindow){ var pk=-1,pv=-1; for(var q=0;q<N;q++){ if(series[q].day&&series[q].score>pv){pv=series[q].score;pk=q;} }
    if(pk>=0) peak='<circle cx="'+x(pk)+'" cy="'+y(pv)+'" r="3.2" fill="'+COLORS[bestWindow.key]+'" stroke="#06222a" stroke-width="1.5"></circle>'; }
  return bands+grid+ticks+
    '<path d="'+area+'" fill="rgba(87,224,207,.08)"></path>'+
    '<path d="'+d+'" fill="none" stroke="#57e0cf" stroke-width="2" stroke-linejoin="round" vector-effect="non-scaling-stroke"></path>'+
    peak+labels;
}
function chartSVG(series, inner, cursorIdx){
  var N=series.length, g=CHART_GEOM, plotH=g.H-g.padT-g.padB;
  var cx=chartX(cursorIdx,N), cy=chartY(series[cursorIdx]?series[cursorIdx].score:0);
  var cc=series[cursorIdx]?COLORS[series[cursorIdx].key]:"#57e0cf";
  var cursor='<line x1="'+cx+'" y1="'+g.padT+'" x2="'+cx+'" y2="'+(g.padT+plotH)+'" stroke="#eafaf8" stroke-width="1.3" stroke-dasharray="'+(cursorIdx===0?"2 2":"0")+'" vector-effect="non-scaling-stroke"></line>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="3.6" fill="'+cc+'" stroke="#eafaf8" stroke-width="1.3"></circle>';
  return '<svg class="trend" viewBox="0 0 '+g.W+' '+g.H+'" preserveAspectRatio="xMidYMid meet">'+inner+cursor+'</svg>';
}
function trendBlock(L, cursorIdx){
  if(!L.series||!L.series.length||!L.chartInner) return "";
  var cap="";
  if(cursorIdx>0 && L.series[cursorIdx]){
    var r=L.series[cursorIdx], cc=COLORS[r.key];
    cap='<span style="color:'+cc+'">'+dayLabelRel(r.date)+' '+hourLabel(r.hr)+' · score '+r.score+'</span>';
  } else if(L.bestWindow){
    var bw=L.bestWindow, c=COLORS[bw.key];
    var span=bw.hrA===bw.hrB?hourLabel(bw.hrA):(hourLabel(bw.hrA)+"–"+hourLabel(bw.hrB));
    cap='<span style="color:'+c+'">Best window: '+dayLabelRel(bw.date)+' '+span+' · peak '+bw.peak+'</span>';
  } else { cap='<span class="muted">No clear daylight window in range</span>'; }
  return '<div class="trend-wrap"><div class="trend-head"><span class="outlook-label">Divability · next 72h</span>'+cap+'</div>'+chartSVG(L.series,L.chartInner,cursorIdx)+'</div>';
}

// plain-language "what's good / what's bad"
function goodBad(site,L,sc,rctx){
  var good=[], bad=[], f=sc.f;
  var offshore = L.windDir!=null && angDiff(site.faces,L.windDir)>=110;
  // positives
  if(f.surf<8) good.push("Small surf for the entry");
  if(sc.dirMult<0.8) good.push("Sheltered from the current swell angle");
  if(L.windKn!=null&&L.windKn<8&&!sc.onshore) good.push(offshore?"Light offshore wind — clean":"Light wind");
  if(L.swellPeriod!=null&&L.swellPeriod>=13) good.push("Long-period groundswell (clean water)");
  if(rctx.chl!=null&&rctx.chl<1) good.push("Clear water — low plankton");
  if(f.tide<1&&TIDE_PREF[site.id]&&rctx.tideNow!=null) good.push("Tide good for the entry");
  if(f.rain<1&&f.bloom<1&&f.period<1&&good.length<2) good.push("No recent runoff or chop");
  // negatives, ordered by severity
  var cand=[];
  if(f.surf>=18) cand.push([f.surf, (L.swellPeriod>=13?"Heavy long-period energy at the entry":"Too much surf for the entry")]);
  else if(f.surf>=9) cand.push([f.surf,"Surf a bit big for a clean entry"]);
  if(f.wind>=8) cand.push([f.wind, sc.onshore?"Onshore wind chopping the surface":"Windy surface"]);
  if(f.period>=5) cand.push([f.period,"Short-period wind swell — hazy water"]);
  if(f.rain>=7) cand.push([f.rain,"Recent rain runoff — expect murk"]);
  if(f.bloom>=5) cand.push([f.bloom, rctx.chl>5?"Heavy plankton bloom — green water":"Plankton in the water"]);
  if(f.current>=3) cand.push([f.current,"Strong tidal currents today"]);
  if(f.tide>=3) cand.push([f.tide, (rctx.tideNow!=null&&TIDE_PREF[site.id]&&rctx.tideNow<TIDE_PREF[site.id].ideal[0])?"Tide too low for the entry":"Tide not ideal for the entry"]);
  cand.sort(function(a,b){return b[0]-a[0];});
  bad=cand.slice(0,4).map(function(c){return c[1];});
  good=good.slice(0,4);
  if(!good.length) good.push("Nothing standing out as great");
  if(!bad.length) bad.push("Nothing significant against it");
  return { good:good, bad:bad };
}
function goodBadBlock(gb){
  var g=gb.good.map(function(t){return '<li><span class="gb-i gb-ok">✓</span>'+esc(t)+'</li>';}).join("");
  var b=gb.bad.map(function(t){return '<li><span class="gb-i gb-no">✗</span>'+esc(t)+'</li>';}).join("");
  return '<div class="gb"><div class="gb-col"><div class="gb-h gb-h-ok">Working in your favor</div><ul>'+g+'</ul></div>'+
    '<div class="gb-col"><div class="gb-h gb-h-no">Working against you</div><ul>'+b+'</ul></div></div>';
}

function outlookStrip(outlook){

function siteCard(x,i){
  var site=x.site, L=x.L, sc=x.sc;
  var rec=(SCRUB>0&&L.series&&L.series[SCRUB])?L.series[SCRUB]:null;

  // D = the values shown in the headline: live "now" (sc/L) or a scrubbed hour (rec)
  var D, waterF, waterSrc, tideNow, trendArrow;
  if(rec){
    D={score:rec.score,key:rec.key,reason:rec.reason,waveFt:rec.waveFt,swellFt:rec.swellFt,
       swellDir:rec.swellDir,swellPeriod:rec.swellPeriod,windKn:rec.windKn,windDir:rec.windDir,
       onshore:rec.onshore,effSurf:rec.effSurf,dirMult:rec.dirMult,viz:rec.viz,energyKW:rec.energyKW};
    waterF=rec.sstF; waterSrc="model"; tideNow=rec.tideNow;
    trendArrow=rec.tideTrend==="rising"?"↑":(rec.tideTrend==="falling"?"↓":"");
  } else {
    var rctx0=(STATE.ctx&&STATE.ctx[site.region])||{};
    D={score:sc.score,key:VERDICT(sc.score).key,reason:sc.reason,waveFt:L.waveFt,swellFt:L.swellFt,
       swellDir:L.swellDir,swellPeriod:L.swellPeriod,windKn:L.windKn,windDir:L.windDir,
       onshore:sc.onshore,effSurf:sc.effSurf,dirMult:sc.dirMult,
       viz:L.waveFt!=null?vizEstimate(site,L,sc.effSurf,rctx0):null,
       energyKW:wavePowerKW(L.swellFt!=null?L.swellFt:L.waveFt,L.swellPeriod)};
    waterF=(L.buoy&&L.buoy.wtmpF!=null)?L.buoy.wtmpF:L.sstF;
    waterSrc=(L.buoy&&L.buoy.wtmpF!=null)?("buoy "+L.buoyId):"model";
    tideNow=rctx0.tideNow; trendArrow=rctx0.tideTrend==="rising"?"↑":(rctx0.tideTrend==="falling"?"↓":"");
  }
  var rctx=(STATE.ctx&&STATE.ctx[site.region])||{};
  var v=VERDICT(D.score), color=COLORS[v.key], open=!!EXPANDED[site.id];
  var energyLabel=D.swellPeriod==null?"—":(D.swellPeriod>=14?"long-period":(D.swellPeriod>=10?"mid-period":"wind swell"));
  var tFit=tideFit(site.id, tideNow);

  var html='<div class="card'+(rec?" scrubbed":"")+'" style="animation-delay:'+(i*45)+'ms">'+
    '<div class="card-top"><div>'+
      '<div class="eyebrow"><span>'+esc(site.area)+'</span><span class="dot">•</span>'+
        '<span class="diff diff-'+site.diff.toLowerCase()+'">'+site.diff+'</span></div>'+
      '<h3 class="card-name">'+esc(site.name)+'</h3>'+
      '<div class="verdict" style="color:'+color+'">'+v.label+' — <span class="reason">'+D.reason+'</span></div>'+
    '</div>'+ring(D.score,color,64)+'</div>'+
    '<div class="metrics m8">'+
      metric("Surf",D.waveFt!=null?round1(D.waveFt)+'′':'—',D.dirMult<0.95?round1(D.effSurf)+'′ here':'open')+
      metric("Energy",D.energyKW!=null?Math.round(D.energyKW)+' kW':'—',energyLabel)+
      metric("Swell",D.swellFt!=null?round1(D.swellFt)+'′':'—',D.swellPeriod?Math.round(D.swellPeriod)+'s '+compass(D.swellDir):'—')+
      metric("Wind",D.windKn!=null?Math.round(D.windKn)+'kn':'—',D.windDir!=null?compass(D.windDir)+(D.onshore?' on':' off'):'—')+
      metric("Water",waterF!=null?Math.round(waterF)+'°':'—',waterSrc)+
      '<div class="metric"><div class="metric-label">Tide</div><div class="metric-val">'+(tideNow!=null?round1(tideNow)+'′ '+trendArrow:'—')+'</div><div class="metric-sub" style="color:'+tFit[1]+'">'+tFit[0]+'</div></div>'+
      metric("Viz est",D.viz?D.viz[0]+'–'+D.viz[1]+'′':'—',"model")+
      metric("Calm window",L.window||'—',"surf low")+
    '</div>'+
    trendBlock(L,SCRUB)+
    outlookStrip(L.outlook);

  if(L.buoy && SCRUB===0){
    html+='<div class="buoyline">◉ Buoy '+L.buoyId+': '+(L.buoy.wvhtFt!=null?round1(L.buoy.wvhtFt)+'′':'—')+
      (L.buoy.dpd!=null?' @ '+Math.round(L.buoy.dpd)+'s '+compass(L.buoy.mwd):'')+
      (L.buoy.wtmpF!=null?' · '+Math.round(L.buoy.wtmpF)+'°F':'')+' <span class="muted">('+ago(L.buoy.time)+')</span></div>';
  }

  html+='<button class="expand" data-toggle="'+site.id+'">'+(open?"Hide detail ▲":"Why this score ▾")+'</button>';

  if(open){
    var gb=goodBad(site,L,sc,rctx);
    html+='<div class="detail">'+
      goodBadBlock(gb)+
      '<details class="bars"><summary>Score breakdown</summary><div class="factors">'+
      fbar("Surf / entry",sc.f.surf)+fbar("Wind",sc.f.wind)+fbar("Swell period",sc.f.period)+
      fbar("Rain runoff",sc.f.rain)+fbar("Plankton",sc.f.bloom)+fbar("Currents",sc.f.current)+fbar("Tide fit",sc.f.tide)+
      '</div></details>'+
      '<p class="best">'+esc(site.best)+'</p>'+
      '<p class="muted" style="font-family:var(--mono);font-size:10.5px;margin:0 0 8px">Surf/entry is judged on wave <em>energy</em> (height² × period), so long-period groundswell scores harder than the same height of windchop. The 72h graph re-scores every hour; chlorophyll &amp; tide-fit on outlook days are projected.</p>'+
      tideStrip(STATE.tides&&STATE.tides[site.region],TIDE_STATIONS[site.region].label+' tides',rctx.tidalRange)+'</div>';
  }
  return html+'</div>';
}

function contours(){
  var paths="";
  for(var i=0;i<7;i++){ var y=40+i*52;
    paths+='<path d="M0 '+y+' C 200 '+(y-26)+', 400 '+(y+30)+', 600 '+y+' S 1000 '+(y-28)+', 1200 '+(y+8)+'" fill="none" stroke="#3fd0c0" stroke-width="1" opacity="'+(0.05+i*0.006)+'"></path>';
  }
  return '<svg class="contours" viewBox="0 0 1200 420" preserveAspectRatio="none" aria-hidden="true">'+paths+'</svg>';
}

function scored(){
  if(!STATE.live||!STATE.ctx) return [];
  return SITES.map(function(site,i){
    var L=STATE.live[i];
    var sc=scoreSite(site,L,STATE.ctx[site.region]);
    var rec=(SCRUB>0&&L.series&&L.series[SCRUB])?L.series[SCRUB]:null;
    return { site:site, L:L, sc:sc, rec:rec, disp:rec?rec.score:sc.score };
  })
    .filter(function(x){ return REGION==="ALL"||x.site.region===REGION; })
    .sort(function(a,b){ return b.disp-a.disp; });
}

function diagStrip(){
  var d=STATE.diag; if(!d) return "";
  var order=[["marine","Swell"],["forecast","Wind/rain"],["tides","Tides"],["buoys","Buoys"],["chl","Chlorophyll"]];
  var dot=function(s){ return s==="ok"?"#67c98f":(s==="fail"?"#ef6a63":"#8fb0b6"); };
  var items=order.map(function(o){
    var s=d[o[0]]||"…";
    return '<span class="dchip"><i style="background:'+dot(s)+'"></i>'+o[1]+'</span>';
  }).join("");
  var via=d.via==="proxy"?' <span class="dvia">· via fallback proxy</span>':'';
  return '<div class="diag">'+items+via+'</div>';
}

function buildFeatured(top){
  if(!(STATE.status==="ok"&&top)) return '<div id="featured"></div>';
  var tr=top.rec, tscore=top.disp, tv=VERDICT(tscore), tc=COLORS[tv.key];
  var tReason=tr?tr.reason:top.sc.reason;
  var tWave=tr?tr.waveFt:top.L.waveFt, tPer=tr?tr.swellPeriod:top.L.swellPeriod, tDir=tr?tr.swellDir:top.L.swellDir;
  var tWind=tr?tr.windKn:top.L.windKn, tSwellFt=tr?tr.swellFt:top.L.swellFt;
  var tag=(SCRUB>0&&tr)?("Best at "+dayLabelRel(tr.date)+" "+hourLabelLong(tr.hr)):"Best right now";
  var pw=wavePowerKW(tSwellFt!=null?tSwellFt:tWave,tPer);
  return '<div class="featured" id="featured"><div class="featured-tag">'+tag+'</div>'+
    '<div class="featured-row">'+ring(tscore,tc,92)+
    '<div class="featured-body"><div class="featured-name">'+esc(top.site.name)+'</div>'+
    '<div class="featured-area">'+REGION_LABEL[top.site.region]+' · '+esc(top.site.area)+'</div>'+
    '<div class="featured-reason" style="color:'+tc+'">'+tv.label+' — '+tReason+'</div></div>'+
    '<div class="featured-stats">'+
      '<span>'+(tWave!=null?round1(tWave)+'′ surf':'—')+'</span>'+
      '<span>'+(tPer?Math.round(tPer)+'s '+compass(tDir):'—')+'</span>'+
      '<span>'+(pw!=null?Math.round(pw)+' kW/m':'—')+'</span>'+
      '<span>'+(tWind!=null?Math.round(tWind)+'kn wind':'—')+'</span>'+
      '<span>'+(top.L.window?'calm ~'+top.L.window:'—')+'</span>'+
    '</div></div></div>';
}
function scrubRowInner(){
  var refSeries=null, lv=STATE.live||[];
  for(var si=0; si<lv.length; si++){ if(lv[si].series&&lv[si].series.length){ refSeries=lv[si].series; break; } }
  var slabel="Now (live)";
  if(refSeries && SCRUB>0 && refSeries[SCRUB]){ var rr=refSeries[SCRUB]; slabel=dayLabelRel(rr.date)+" "+hourLabelLong(rr.hr)+"  ·  +"+SCRUB+"h"; }
  return '<span class="scrub-cap">Conditions at</span>'+
    '<span class="scrub-time'+(SCRUB>0?" on":"")+'">'+slabel+'</span>'+
    (SCRUB>0?'<button class="scrub-now" id="scrubnow">↺ now</button>':'');
}

function view(){
  var list=scored(), top=list[0];
  var fmtWhen=STATE.when?new Intl.DateTimeFormat("en-US",{timeZone:"America/Los_Angeles",hour:"numeric",minute:"2-digit",weekday:"short"}).format(STATE.when):"";
  var regionsShown=REGION==="ALL"?["SD","OC"]:[REGION];

  var hero='<header class="hero">'+contours()+'<div class="hero-inner">'+
    '<div class="hero-head"><div>'+
      '<div class="kicker">Orange County · San Diego County</div>'+
      '<h1>SoCal Shore Diving<span class="thin"> / Conditions Board</span></h1>'+
      '<div class="subtitle">Live swell · NDBC buoys · satellite chlorophyll · tides</div>'+
    '</div><div class="hero-actions">'+
      '<span class="stamp">'+(STATE.status==="ok"?"Updated "+fmtWhen+" PT":"—")+'</span>'+
      '<button class="refresh" id="refresh"'+(STATE.status==="loading"?" disabled":"")+'>'+(STATE.status==="loading"?"Reading water…":"↻ Refresh")+'</button>'+
    '</div></div>';

  hero+=buildFeatured(top);
  hero+='</div></header>';

  var legendKeys=[["excellent","Excellent"],["good","Good"],["fair","Fair"],["marginal","Marginal"],["blown","Blown out"]];
  var controls='<div class="controls"><div class="seg">'+
    ["ALL","OC","SD"].map(function(r){ return '<button class="seg-btn'+(REGION===r?" on":"")+'" data-region="'+r+'">'+(r==="ALL"?"All sites":REGION_LABEL[r])+'</button>'; }).join("")+
    '</div><div class="legend">'+
    legendKeys.map(function(k){ return '<span class="leg"><i style="background:'+COLORS[k[0]]+'"></i>'+k[1]+'</span>'; }).join("")+
    '</div></div>';

  var ocean="";
  if(STATE.status==="ok"&&STATE.ctx){
    var d=STATE.diag||{};
    var degraded = d.via==="proxy" || ["forecast","tides","buoys","chl"].some(function(k){return d[k]==="fail";});
    ocean='<div class="ocean-wrap">'+(degraded?diagStrip():"")+regionsShown.map(oceanPanel).join("")+'</div>';
  }

  var grid='<main class="grid">';
  if(STATE.status==="error"){
    grid+='<div class="state"><p>'+esc(STATE.err||"Couldn't reach the data feeds.")+'</p>'+
      '<p class="muted">"Failed to fetch" means the browser couldn\'t reach the API at all — usually because the page is opened as a local file, or a privacy/ad blocker is intercepting requests. '+
      'It tried a direct connection and a fallback proxy; both were blocked.</p>'+
      '<p class="muted">Fixes: host this file (e.g. drag it onto app.netlify.com/drop) and open the resulting https link, or disable shields/ad-blockers for this page.</p>'+
      diagStrip()+
      '<button class="refresh" id="retry">↻ Retry</button></div>';
  }
  if(STATE.status==="loading"&&!STATE.live){
    grid+='<div class="state"><p>Reading the water across 16 sites…</p></div>';
  }
  if(STATE.status==="ok"){
    grid+=list.map(siteCard).join("");
  }
  grid+='</main>';

  var foot='<footer class="foot"><div class="foot-grid"><div>'+
    '<h4>Cross-check before you load the truck</h4>'+
    '<p class="muted">Scores blend live models with measured buoys and 8-day satellite chlorophyll — they\'re guidance, not a measurement. '+
    'Confirm against a live cam and recent diver reports, and after rain give it ~72 hours for runoff and water quality.</p></div>'+
    '<div class="links">'+
      '<a href="https://justgetwet.com/blogs/dive-reports-and-conditions" target="_blank" rel="noreferrer">SD diver reports</a>'+
      '<a href="https://www.surfline.com/surf-reports-forecasts-cams/southern-california/2143" target="_blank" rel="noreferrer">Surfline cams</a>'+
      '<a href="https://beachreportcard.org" target="_blank" rel="noreferrer">Beach water quality</a>'+
      '<a href="https://www.ndbc.noaa.gov/" target="_blank" rel="noreferrer">NDBC buoys</a>'+
      '<a href="https://coastwatch.pfeg.noaa.gov/" target="_blank" rel="noreferrer">CoastWatch ocean color</a>'+
    '</div></div>'+
    '<div class="src">Swell/wind: Open-Meteo · Tides: NOAA CO-OPS ('+TIDE_STATIONS.SD.label+' + '+TIDE_STATIONS.OC.label+') · '+
    'Buoys: NOAA NDBC via CoastWatch ERDDAP (cwwcNDBCMet) · Chlorophyll: NASA MODIS-Aqua 8-day via ERDDAP (erdMH1chla8day). '+
    'Site profiles are editable heuristics — tune them as you log dives.</div></footer>';

  var scrubBar="";
  if(STATE.status==="ok" && SCRUB_MAX>0){
    scrubBar='<div class="scrub">'+
      '<div class="scrub-row" id="scrubrow">'+scrubRowInner()+'</div>'+
      '<input class="scrub-range" id="scrub" type="range" min="0" max="'+SCRUB_MAX+'" value="'+SCRUB+'" step="1" aria-label="Time" />'+
      '<div class="scrub-ticks"><span>now</span><span>+24h</span><span>+48h</span><span>+72h</span></div>'+
    '</div>';
  }

  return hero+controls+scrubBar+ocean+grid+foot;
}

function render(){ root.innerHTML=view(); }

// partial update on scrub — rebuilds cards + featured + label WITHOUT replacing
// the slider element, so a drag gesture isn't interrupted.
function renderScrub(){
  var list=scored();
  var g=root.querySelector(".grid"); if(g) g.innerHTML=list.map(siteCard).join("");
  var f=root.querySelector("#featured");
  if(f){ var tmp=document.createElement("div"); tmp.innerHTML=buildFeatured(list[0]); if(tmp.firstChild) f.replaceWith(tmp.firstChild); }
  var row=root.querySelector("#scrubrow"); if(row) row.innerHTML=scrubRowInner();
}
var scrubPending=false;
function scrubTo(v){
  SCRUB=Math.max(0,Math.min(SCRUB_MAX,v|0));
  if(scrubPending) return;
  scrubPending=true;
  (window.requestAnimationFrame||function(cb){setTimeout(cb,16);})(function(){ scrubPending=false; renderScrub(); });
}

function load(){
  STATE.status="loading";
  render();
  fetchAll().then(function(d){
    STATE={status:"ok",live:d.live,tides:d.tides,buoyData:d.buoyData,ctx:d.ctx,when:d.when,err:null,diag:d.diag};
    var maxLen=0; (d.live||[]).forEach(function(L){ if(L.series&&L.series.length>maxLen) maxLen=L.series.length; });
    SCRUB_MAX=Math.max(0,Math.min(72,maxLen-1));
    if(SCRUB>SCRUB_MAX) SCRUB=0;
    render();
  }).catch(function(e){
    STATE.status="error"; STATE.err=(e&&e.message)||"Fetch failed"; STATE.diag=(e&&e.diag)||Object.assign({},DIAG);
    render();
  });
}

root.addEventListener("input",function(e){
  if(e.target&&e.target.id==="scrub"){ scrubTo(parseInt(e.target.value,10)); }
});
root.addEventListener("click",function(e){
  var r=e.target.closest("[data-region]");
  if(r){ REGION=r.getAttribute("data-region"); render(); return; }
  if(e.target.closest("#scrubnow")){ SCRUB=0; render(); return; }
  if(e.target.closest("#refresh")||e.target.closest("#retry")){ load(); return; }
  var t=e.target.closest("[data-toggle]");
  if(t){ var id=t.getAttribute("data-toggle"); EXPANDED[id]=!EXPANDED[id]; render(); return; }
});

load();
</script>
</body>
</html>
